resources:
  partition: c-main
  job_name: snakemake
  time: "04:00:00"
  account: def-supervisor
  cpus_per_task: 1
  mem: 1GB
  output: slurm-snakemake.out
  error: slurm-snakemake.err
  mail_user: your.email@example.com
  mail_type: ALL

